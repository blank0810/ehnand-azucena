<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#111827"/>
  <rect width="500" height="300" fill="url(#grid)" opacity="0.04"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#6b7280" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Water drop icon -->
  <g transform="translate(250, 120)">
    <path d="M0 -60 C-10 -40 -36 -10 -36 16 C-36 36 -20 52 0 52 C20 52 36 36 36 16 C36 -10 10 -40 0 -60Z" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.7"/>
    <path d="M0 -60 C-10 -40 -36 -10 -36 16 C-36 36 -20 52 0 52 C20 52 36 36 36 16 C36 -10 10 -40 0 -60Z" fill="#3b82f6" opacity="0.1"/>
    <path d="M-14 18 C-14 8 -8 2 0 2" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
  <!-- Label -->
  <text x="250" y="220" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">Initao Water Billing System</text>
  <text x="250" y="244" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Government Enterprise Application</text>
