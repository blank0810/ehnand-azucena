<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#111827"/>
  <rect width="500" height="300" fill="url(#grid2)" opacity="0.04"/>
  <defs>
    <pattern id="grid2" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#6b7280" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Bar chart icon -->
  <g transform="translate(208, 82)">
    <!-- Bars -->
    <rect x="0"  y="60" width="18" height="36" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="24" y="36" width="18" height="60" rx="2" fill="#3b82f6" opacity="0.65"/>
    <rect x="48" y="20" width="18" height="76" rx="2" fill="#3b82f6" opacity="0.8"/>
    <rect x="72" y="44" width="18" height="52" rx="2" fill="#3b82f6" opacity="0.65"/>
    <!-- Trend line -->
    <polyline points="9,72 33,48 57,32 81,56" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Dots on trend line -->
    <circle cx="9"  cy="72" r="3" fill="#10b981" opacity="0.9"/>
    <circle cx="33" cy="48" r="3" fill="#10b981" opacity="0.9"/>
    <circle cx="57" cy="32" r="3" fill="#10b981" opacity="0.9"/>
    <circle cx="81" cy="56" r="3" fill="#10b981" opacity="0.9"/>
    <!-- Baseline -->
    <line x1="0" y1="96" x2="90" y2="96" stroke="#374151" stroke-width="1.5"/>
  </g>
  <!-- Label -->
  <text x="250" y="220" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">Swiss Energy Platform Suite</text>
  <text x="250" y="244" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Financial Reconciliation &amp; Operations</text>
</svg>
